version: "3.8"

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: iaair-prometheus
    network_mode: host
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.template.yml
      - ./prometheus-entrypoint.sh:/entrypoint.sh
      - ./iaair_alerts.yml:/etc/prometheus/iaair_alerts.yml
      - prometheus_data:/prometheus
    environment:
      - GRAFANA_CLOUD_PROM_USERNAME=${GRAFANA_CLOUD_PROM_USERNAME}
      - GRAFANA_CLOUD_API_KEY=${GRAFANA_CLOUD_API_KEY}
      - GRAFANA_CLOUD_REMOTE_WRITE_URL=${GRAFANA_CLOUD_REMOTE_WRITE_URL}
    entrypoint: /entrypoint.sh
    restart: unless-stopped

  # Grafana Alloy — lightweight agent that pushes metrics to Grafana Cloud.
  # Replaces the local Grafana container. Dashboards live at:
  #   https://daongochoa2002.grafana.net
  alloy:
    image: grafana/alloy:latest
    container_name: iaair-alloy
    network_mode: host
    volumes:
      - ./alloy-config.alloy:/etc/alloy/config.alloy
    environment:
      - GRAFANA_CLOUD_PROM_USERNAME=${GRAFANA_CLOUD_PROM_USERNAME}
      - GRAFANA_CLOUD_API_KEY=${GRAFANA_CLOUD_API_KEY}
      - GRAFANA_CLOUD_REMOTE_WRITE_URL=${GRAFANA_CLOUD_REMOTE_WRITE_URL}
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:latest
    container_name: iaair-alertmanager
    network_mode: host
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=http://localhost:9093'
    restart: unless-stopped

volumes:
  prometheus_data:
  alertmanager_data: