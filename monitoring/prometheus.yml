global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "iaair_alerts.yml"

scrape_configs:
  - job_name: 'iaair-api'
    static_configs:
      - targets: ['dressily-duskish-felisha.ngrok-free.dev']
    scheme: https
    metrics_path: /metrics
    # This header is MANDATORY for ngrok free tier
    extra_headers:
      ngrok-skip-browser-warning: "true"

# ── Grafana Cloud remote_write ──────────────────────────────────────────
# Pushes all scraped metrics to Grafana Cloud Mimir.
# Credentials are loaded from .env (see .env.example).
remote_write:
  - url: ${GRAFANA_CLOUD_REMOTE_WRITE_URL}
    basic_auth:
      username: ${GRAFANA_CLOUD_PROM_USERNAME}
      password: ${GRAFANA_CLOUD_API_KEY}

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          # - alertmanager:9093